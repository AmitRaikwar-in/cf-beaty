name: Release Extension

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v1.1.0)'
        required: true
        default: 'v1.1.0'

jobs:
  release:
    name: Package and Release Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Package Extension (Zip)
        run: |
          zip -r codeforces-beautifier.zip . -x "*.git*" "*.github*" "*.DS_Store*"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: codeforces-beautifier.zip
          tag_name: ${{ github.event.inputs.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.PA_TOKEN }}
